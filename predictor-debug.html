<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #15151e; color: white; }
        select { width: 300px; padding: 10px; margin: 10px 0; background: #1a1a2e; color: white; border: 1px solid #333; }
        .debug { background: #2a2a3e; padding: 15px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Predictor Debug Page</h1>

    <div class="debug" id="debug1">Loading script.js...</div>
    <div class="debug" id="debug2"></div>
    <div class="debug" id="debug3"></div>

    <label>Race Select:</label>
    <select id="raceSelect"></select>

    <br><br>
    <label>Driver Select:</label>
    <select id="driverSelect"></select>

    <script src="script.js"></script>
    <script>
        setTimeout(() => {
            const debug1 = document.getElementById('debug1');
            const debug2 = document.getElementById('debug2');
            const debug3 = document.getElementById('debug3');

            // Check if variables exist
            debug1.innerHTML = 'RACE_SCHEDULE_2026 exists: ' + (typeof RACE_SCHEDULE_2026 !== 'undefined') +
                                '<br>RACE_SCHEDULE_2026 length: ' + (RACE_SCHEDULE_2026 ? RACE_SCHEDULE_2026.length : 'N/A') +
                                '<br>DRIVERS_2026 exists: ' + (typeof DRIVERS_2026 !== 'undefined') +
                                '<br>DRIVERS_2026 length: ' + (DRIVERS_2026 ? DRIVERS_2026.length : 'N/A');

            if (typeof PREDICTION_RACES !== 'undefined') {
                debug2.innerHTML = 'PREDICTION_RACES exists: true<br>PREDICTION_RACES length: ' + PREDICTION_RACES.length +
                                    '<br>PREDICTION_RACES: ' + JSON.stringify(PREDICTION_RACES);
            } else {
                debug2.innerHTML = 'PREDICTION_RACES: undefined';
            }

            // Try to manually populate
            const raceSelect = document.getElementById('raceSelect');
            const driverSelect = document.getElementById('driverSelect');

            if (RACE_SCHEDULE_2026) {
                const upcomingRaces = RACE_SCHEDULE_2026.filter(race => !race.completed && !race.cancelled);
                debug3.innerHTML = 'Upcoming races found: ' + upcomingRaces.length +
                                   '<br>Races: ' + upcomingRaces.map(r => r.name).join(', ');

                let raceOptions = '<option value="">-- Choose a Race --</option>';
                upcomingRaces.forEach(race => {
                    raceOptions += `<option value="${race.round}">Round ${race.round}: ${race.name} GP</option>`;
                });
                raceSelect.innerHTML = raceOptions;
            }

            if (DRIVERS_2026) {
                let driverOptions = '<option value="">Select Driver</option>';
                DRIVERS_2026.forEach(driver => {
                    driverOptions += `<option value="${driver.name}">${driver.name}</option>`;
                });
                driverSelect.innerHTML = driverOptions;
            }
        }, 500);
    </script>
</body>
</html>
