<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Embed Test</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 40px 20px;
        }
        .debug {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instagram Embed Test - Official Embed</h1>
        <p>Testing the official Instagram embed functionality...</p>

        <!-- Instagram Post Embed -->
        <div class="instagram-embed-container" id="instagramEmbed" style="display: none;">
            <!-- Instagram embed will be dynamically loaded here -->
        </div>

        <div class="debug" id="debug">
            Debug info will appear here...
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Additional debug info
        document.addEventListener('DOMContentLoaded', async () => {
            const debug = document.getElementById('debug');
            debug.innerHTML += '<br>Page loaded, waiting for Instagram embed...';

            // Check if embed appears after a delay
            setTimeout(() => {
                const embedContainer = document.getElementById('instagramEmbed');
                if (embedContainer && embedContainer.style.display !== 'none') {
                    debug.innerHTML += '<br><br>✓ Embed container is visible!';
                    debug.innerHTML += '<br>Container HTML: ' + embedContainer.innerHTML.substring(0, 200) + '...';
                } else {
                    debug.innerHTML += '<br><br>Embed container not yet visible...';
                }
            }, 2000);
        });
    </script>
</body>
</html>
