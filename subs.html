<!DOCTYPE html>
<html>
<head><title>Subscribers</title></head>
<body style="background:#0a0a0a;color:white;font-family:sans-serif;padding:40px;">
    <h1>📧 Newsletter Subscribers</h1>
    <div id="result"></div>
    <a href="index.html" style="color:#E10600">← Back</a>
    <script>
        const subs = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
        const result = document.getElementById('result');
        if (subs.length === 0) {
            result.innerHTML = '<p style="color:#888">No subscribers yet</p>';
        } else {
            result.innerHTML = '<p><strong>Total: ' + subs.length + '</strong></p>' +
                subs.map(s => `<p>📧 ${s.email}<br><small style="color:#888">${new Date(s.date).toLocaleString()}</small></p>`).join('<hr>');
        }
    </script>
</body>
</html>
