<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Subscribe Test - F1wow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 40px;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
        }
        .test-container {
            max-width: 600px;
            width: 90%;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(225, 6, 0, 0.3);
            text-align: center;
        }
        h1 { color: white; margin-bottom: 20px; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid #22c55e;
        }
        .status.info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }
        .email-display {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            color: #E10600;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            padding: 15px 30px;
            background: #E10600;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover {
            background: #ff1a1a;
            transform: translateY(-2px);
        }
        button.secondary {
            background: #333;
        }
        button.secondary:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Subscribe & Welcome Email Test</h1>
        <p style="color: #aaa; margin-bottom: 20px;">This will add your email and send a welcome email automatically</p>

        <form class="subscribe-form" onsubmit="handleSubscribe(event)" style="margin-bottom: 30px;">
            <input type="email" id="subscribeEmail" value="yadavdheeraj129@gmail.com" required
                style="padding: 15px; width: 80%; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-size: 1rem;">
            <button type="submit" class="subscribe-btn"
                style="padding: 15px 30px; background: #E10600; border: none; color: white; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: 600; margin-left: 10px;">
                <span class="btn-text">Subscribe Now</span>
            </button>
        </form>

        <div class="status info">
            <strong>📧 What happens:</strong><br>
            1. Your email is stored<br>
            2. Welcome email is sent automatically<br>
            3. No redirect, no activation needed
        </div>

        <div class="actions">
            <button class="secondary" onclick="viewSubscribers()">
                👁️ View All Subscribers
            </button>
            <button class="secondary" onclick="clearAll()">
                🗑️ Clear All Subscribers
            </button>
        </div>

        <div id="result" style="margin-top: 20px; padding: 15px; border-radius: 10px; display: none;"></div>
    </div>

    <script>
        function viewSubscribers() {
            const subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            const result = document.getElementById('result');
            result.style.display = 'block';
            result.style.background = 'rgba(59, 130, 246, 0.1)';
            result.style.color = '#fff';
            result.style.border = '1px solid #3b82f6';

            if (subscribers.length === 0) {
                result.innerHTML = '<strong>No subscribers yet</strong>';
            } else {
                result.innerHTML = '<strong>' + subscribers.length + ' Subscriber(s):</strong><br><br>' +
                    subscribers.map(s => `
                        📧 ${s.email}<br>
                        <small style="color: #888;">Subscribed: ${new Date(s.date).toLocaleString()}</small>
                    `).join('<br><br>');
            }
        }

        function clearAll() {
            if (confirm('Clear all subscribers?')) {
                localStorage.removeItem('f1wow_subscribers');
                const result = document.getElementById('result');
                result.style.display = 'block';
                result.className = 'status success';
                result.textContent = '✅ All subscribers cleared!';
            }
        }
    </script>
</body>
</html>
