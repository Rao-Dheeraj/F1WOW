<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Test - F1wow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 40px; background: #0a0a0a; min-height: 100vh; }
        .test-container { max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 30px; border-radius: 15px; }
        .test-section { margin-bottom: 30px; padding: 20px; background: rgba(225, 6, 0, 0.1); border-radius: 10px; }
        .test-result { margin-top: 10px; padding: 10px; border-radius: 5px; font-family: monospace; }
        .test-result.pass { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .test-result.fail { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        h1 { color: white; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #E10600; border: none; color: white; border-radius: 8px; cursor: pointer; margin: 5px; }
        button:hover { background: #ff1a1a; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Subscribe Functionality Test</h1>

        <div class="test-section">
            <h3>1. Test Subscribe Form</h3>
            <form class="subscribe-form" onsubmit="handleSubscribe(event)">
                <input type="email" id="subscribeEmail" placeholder="Enter your email" required class="subscribe-input" style="padding: 12px; width: 70%; border-radius: 8px; border: 1px solid #333;">
                <button type="submit" class="subscribe-btn" style="padding: 12px 24px;">
                    <span class="btn-text">Subscribe</span>
                </button>
            </form>
        </div>

        <div class="test-section">
            <h3>2. Test Functions</h3>
            <button onclick="testGetSubscribers()">View All Subscribers</button>
            <button onclick="testClearSubscribers()">Clear All Subscribers</button>
            <button onclick="testNotify()">Test Notify (Opens Email)</button>
            <div id="testResult" class="test-result"></div>
        </div>

        <div class="test-section">
            <h3>3. Admin Panel Test</h3>
            <button onclick="openAdminPanel(event)">Open Admin Panel</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-content">
            <div class="admin-header">
                <h3>📧 Newsletter Admin</h3>
                <button class="admin-close" onclick="closeAdminPanel()">×</button>
            </div>
            <div class="admin-stats">
                <div class="admin-stat">
                    <span class="stat-value" id="totalSubscribers">0</span>
                    <span class="stat-label">Total Subscribers</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function testGetSubscribers() {
            const subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            const result = document.getElementById('testResult');
            result.className = 'test-result pass';
            result.innerHTML = `<strong>${subscribers.length} Subscribers:</strong><br>` +
                subscribers.map(s => `- ${s.email} (${new Date(s.date).toLocaleString()})`).join('<br>') ||
                'No subscribers yet';
        }

        function testClearSubscribers() {
            if (confirm('Clear all subscribers?')) {
                localStorage.removeItem('f1wow_subscribers');
                updateSubscriberCount();
                document.getElementById('testResult').className = 'test-result pass';
                document.getElementById('testResult').textContent = 'All subscribers cleared!';
            }
        }

        function testNotify() {
            const subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            if (subscribers.length === 0) {
                document.getElementById('testResult').className = 'test-result fail';
                document.getElementById('testResult').textContent = 'No subscribers to notify!';
                return;
            }
            notifySubscribers('Test Article', 'https://f1wow.com/test.html');
        }

        // Initialize
        updateSubscriberCount();
    </script>
</body>
</html>
