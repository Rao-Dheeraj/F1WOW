<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#15151E"/>
  <!-- Racing stripe background -->
  <rect x="0" y="12" width="32" height="8" fill="#E10600"/>
  <!-- F1 Text -->
  <text x="16" y="22" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">F1</text>
  <!-- Speed lines -->
  <line x1="4" y1="8" x2="12" y2="8" stroke="#E10600" stroke-width="2"/>
  <line x1="20" y1="8" x2="28" y2="8" stroke="#E10600" stroke-width="2"/>
  <line x1="4" y1="24" x2="10" y2="24" stroke="#E10600" stroke-width="2"/>
  <line x1="22" y1="24" x2="28" y2="24" stroke="#E10600" stroke-width="2"/>
</svg>