<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1wow Newsletter - Subscribe</title>
    <meta name="description" content="Subscribe to F1wow News newsletter - Get the latest Formula 1 news, race results, and analysis delivered to your inbox.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .subscribe-container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(135deg, rgba(225, 6, 0, 0.1) 0%, rgba(0, 0, 0, 0.5) 100%);
            border: 1px solid rgba(225, 6, 0, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .subscribe-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: rgba(225, 6, 0, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--f1-red, #E10600);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: white;
            margin-bottom: 15px;
        }
        p {
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--f1-red, #E10600);
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--f1-red, #E10600);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #ff1a1a;
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .message.show {
            display: block;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--f1-red, #E10600);
        }
    </style>
</head>
<body>
    <div class="subscribe-container">
        <div class="subscribe-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
        </div>
        <h1>Subscribe to F1wow News</h1>
        <p>Get the latest F1 news, race results, and analysis delivered to your inbox. No spam, unsubscribe anytime.</p>

        <form id="subscribeForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">Subscribe Now</span>
            </button>
        </form>

        <div id="message" class="message"></div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const messageDiv = document.getElementById('message');

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            // Check if already subscribed
            const subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            if (subscribers.includes(email)) {
                showMessage('You are already subscribed!', 'error');
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Subscribing...';

            try {
                // Store locally
                subscribers.push({
                    email: email,
                    date: new Date().toISOString()
                });
                localStorage.setItem('f1wow_subscribers', JSON.stringify(subscribers));

                // Show success
                showMessage('Success! You\'ve been subscribed to F1wow News. Check your inbox to confirm.', 'success');
                btnText.textContent = 'Subscribed!';
                submitBtn.style.background = '#22c55e';
                document.getElementById('email').value = '';

                // Log for admin (in production, this would send to a backend)
                console.log('New subscriber:', email);
                console.log('Total subscribers:', subscribers.length);

            } catch (error) {
                showMessage('Something went wrong. Please try again.', 'error');
                submitBtn.disabled = false;
                btnText.textContent = 'Subscribe Now';
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message show ' + type;
        }
    </script>
</body>
</html>
