<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Test v2 - F1wow</title>
    <style>
        * { box-sizing: border-box; }
        body {
            padding: 40px;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px;
            width: 90%;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #E10600;
            text-align: center;
        }
        h1 { color: white; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #222;
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #E10600; }
        button {
            width: 100%;
            padding: 15px;
            background: #E10600;
            border: none;
            color: white;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #ff1a1a; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .message.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .message.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .message.show { display: block; }
        .debug {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏎️ F1wow Newsletter</h1>
        <p>Subscribe to get the latest F1 news delivered to your inbox!</p>

        <form id="subscribeForm">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Enter your email" required value="yadavdheeraj129@gmail.com">
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">Subscribe Now</span>
            </button>
        </form>

        <div id="message" class="message"></div>
        <div id="debug" class="debug"></div>
    </div>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const messageDiv = document.getElementById('message');
            const debugDiv = document.getElementById('debug');

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            // Check localStorage
            let subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            const exists = subscribers.some(sub => sub.email === email);
            if (exists) {
                showMessage('You are already subscribed!', 'error');
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Subscribing...';
            debugDiv.innerHTML = 'Sending subscription request...';

            try {
                // Using Formsubmit.co with AJAX
                // This sends notification to admin (you) AND auto-reply to subscriber
                const formData = new FormData();
                formData.append('email', email);
                formData.append('_subject', '🏁 New F1wow Subscriber!');
                formData.append('_captcha', 'false');
                formData.append('_template', 'table');
                formData.append('_next', window.location.href);

                debugDiv.innerHTML += '<br>Sending to Formsubmit.co...';

                const response = await fetch('https://formsubmit.co/ajax/yadavdheeraj129@gmail.com', {
                    method: 'POST',
                    body: formData
                });

                debugDiv.innerHTML += '<br>Response status: ' + response.status;

                const result = await response.json();
                debugDiv.innerHTML += '<br>Response: ' + JSON.stringify(result);

                if (result.success === 'true') {
                    // Store in localStorage
                    subscribers.push({
                        email: email,
                        date: new Date().toISOString()
                    });
                    localStorage.setItem('f1wow_subscribers', JSON.stringify(subscribers));

                    showMessage('Success! Check your inbox for a confirmation email.', 'success');
                    btnText.textContent = 'Subscribed! ✓';
                    document.getElementById('email').value = '';
                } else {
                    throw new Error('Failed');
                }
            } catch (error) {
                debugDiv.innerHTML += '<br>Error: ' + error.message;
                showMessage('Something went wrong. Please try again.', 'error');
            } finally {
                setTimeout(() => {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Subscribe Now';
                }, 3000);
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message show ' + type;
        }
    </script>
</body>
</html>
