<!DOCTYPE html>
<html>
<head>
    <title>Test Graph</title>
</head>
<body>
    <h1>Testing Championship Graph</h1>
    <svg id="championshipSvg" viewBox="0 0 800 400" style="width: 100%; height: 400px; border: 1px solid #ccc;"></svg>
    <div id="output"></div>

    <script>
        const CHAMPIONSHIP_DATA_2026 = {
            driver: {
                rounds: ['Australia', 'China'],
                georgeRussell: { name: 'George Russell', team: 'Mercedes', color: '#27F4D2', points: [25, 51] },
                kimiAntonelli: { name: 'Kimi Antonelli', team: 'Mercedes', color: '#27F4D2', points: [18, 47] },
                charlesLeclerc: { name: 'Charles Leclerc', team: 'Ferrari', color: '#F91536', points: [15, 34] }
            },
            constructor: {
                rounds: ['Australia', 'China'],
                mercedes: { name: 'Mercedes', color: '#27F4D2', points: [43, 98] },
                ferrari: { name: 'Ferrari', color: '#F91536', points: [27, 67] }
            }
        };

        let currentGraphType = 'driver';
        let selectedDrivers = ['georgeRussell', 'kimiAntonelli', 'charlesLeclerc'];
        let selectedConstructors = ['mercedes', 'ferrari'];

        function renderGraph() {
            console.log('renderGraph called');
            const svg = document.getElementById('championshipSvg');
            const output = document.getElementById('output');
            if (!svg) {
                output.textContent = 'SVG not found!';
                return;
            }

            const data = CHAMPIONSHIP_DATA_2026[currentGraphType];
            console.log('Data:', data);

            svg.innerHTML = '';

            // Draw some test content
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', '400');
            text.setAttribute('y', '200');
            text.setAttribute('text-anchor', 'middle');
            text.textContent = 'Graph loaded! Type: ' + currentGraphType;
            svg.appendChild(text);

            output.textContent = 'Graph rendered successfully! Data: ' + JSON.stringify(data);
        }

        // Run on load
        window.addEventListener('DOMContentLoaded', renderGraph);
    </script>
</body>
</html>
