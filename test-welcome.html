<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Email Test - F1wow</title>
    <style>
        * { box-sizing: border-box; }
        body {
            padding: 40px;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px;
            width: 90%;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #E10600;
            text-align: center;
        }
        h1 { color: white; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #222;
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #E10600; }
        button {
            width: 100%;
            padding: 15px;
            background: #E10600;
            border: none;
            color: white;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #ff1a1a; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .message.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .message.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .message.show { display: block; }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 10px;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏎️ F1wow Newsletter</h1>
        <p>Subscribe and receive a <strong>welcome email to your inbox</strong>!</p>

        <form id="subscribeForm">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Enter your email" required value="yadavdheeraj129@gmail.com">
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">Subscribe Now</span>
            </button>
        </form>

        <div id="message" class="message"></div>

        <div class="note">
            <strong>📧 Note:</strong> Welcome email will be sent to the email address you enter above.
        </div>
    </div>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const messageDiv = document.getElementById('message');

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            // Check localStorage
            let subscribers = JSON.parse(localStorage.getItem('f1wow_subscribers') || '[]');
            const exists = subscribers.some(sub => sub.email === email);
            if (exists) {
                showMessage('You are already subscribed!', 'error');
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            btnText.textContent = 'Sending welcome email...';

            try {
                // Method 1: Try using OneSignal Email API (free tier, works from client-side)
                const response = await fetch('https://api.onesignal.com/notifications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        app_id: 'onesignal-app-id', // Would need setup
                        include_email_tokens: [email],
                        email_subject: '🏁 Welcome to F1wow!',
                        email_body: 'Welcome to F1wow! You will receive the latest F1 news.',
                        isEmail: true
                    })
                });

                // Method 2: Fallback to FormSubmit with auto-reply
                const formData = new FormData();
                formData.append('email', email);
                formData.append('name', email.split('@')[0]);
                formData.append('subject', '🏁 Welcome to F1wow Newsletter!');
                formData.append('message', `Hi ${email.split('@')[0]},\n\nWelcome to F1wow! 🏎️\n\nYou're now subscribed to receive:\n• Latest F1 news and updates\n• Race results and analysis\n• Driver and team news\n• Exclusive content\n\nWe'll notify you whenever we publish a new article.\n\n— Team F1wow\n\nF1wow - Your Formula 1 News Source`);
                formData.append('_subject', '🏁 Welcome to F1wow Newsletter!');
                formData.append('_captcha', 'false');
                formData.append('_template', 'box');

                const formResponse = await fetch('https://formsubmit.co/ajax/' + email, {
                    method: 'POST',
                    body: formData
                });

                const result = await formResponse.json();

                // Store in localStorage regardless of email result
                subscribers.push({
                    email: email,
                    date: new Date().toISOString()
                });
                localStorage.setItem('f1wow_subscribers', JSON.stringify(subscribers));

                if (result.success === 'true') {
                    showMessage('Welcome email sent! Check your inbox at ' + email, 'success');
                } else {
                    showMessage('Subscribed! Welcome email on its way.', 'success');
                }

                btnText.textContent = 'Subscribed! ✓';
                document.getElementById('email').value = '';

            } catch (error) {
                console.error('Error:', error);

                // Store locally anyway
                subscribers.push({
                    email: email,
                    date: new Date().toISOString()
                });
                localStorage.setItem('f1wow_subscribers', JSON.stringify(subscribers));

                showMessage('Subscribed successfully!', 'success');
                btnText.textContent = 'Subscribed! ✓';
                document.getElementById('email').value = '';
            } finally {
                setTimeout(() => {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Subscribe Now';
                }, 3000);
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message show ' + type;
        }
    </script>
</body>
</html>
